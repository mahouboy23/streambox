<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>StreamBox</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="Style/Style.css">
    <script src="js/script.js" defer></script>
</head>

<body>

    <header>
        <h1>StreamBox</h1>
        <p id="tagline">Your place to watch great shows anytime.</p>
    </header>

    <nav>
        <button class="hamburger">☰</button>
        <ul id="nav-list">
            <li><a href="/">Home</a></li>
            <li><a href="#">Shows</a></li>
            <li><a href="#">Movies</a></li>
            <li><a href="#">My List</a></li>
        </ul>
    </nav>

    <main>

        <section id="hero">
            <h2>Welcome to StreamBox</h2>
            <p>Discover trending shows and new releases.</p>

            <a href="#" class="btn-primary">Browse Shows</a>
        </section>

        <section id="featured">
            <h2 class="section-title">Featured Movies</h2>
            <div id="movie-catalog"></div>
        </section>

    </main>

    <footer>
        <p>© 2026 StreamBox</p>
    </footer>

</body>
</html>
